# ─────────────────────────────────────────────────────────────────────────────
#  Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  marquez_pgdata:
  ivy_cache:
  grafana_data:
  nessie_data:
  chroma_data:

# ─────────────────────────────────────────────────────────────────────────────
#  Servicios
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ════════════════════════════════════════════════════════════════════════════
  #  MARQUEZ  (OpenLineage backend)
  # ════════════════════════════════════════════════════════════════════════════

  marquez-db:
    image: postgres:14
    container_name: marquez-db
    logging:
      driver: "none"
    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez_pgdata:/var/lib/postgresql/data
    networks:
      default:
        aliases:
          - postgres        # Marquez busca exactamente este hostname
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez -d marquez"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  marquez:
    image: marquezproject/marquez:0.47.0
    container_name: marquez
    logging:
      driver: "none"
    ports:
      - "5000:5000"         # OpenLineage HTTP + REST API
      - "5001:5001"         # Admin / health
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    depends_on:
      marquez-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/healthcheck || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  marquez-web:
    image: marquezproject/marquez-web:0.47.0
    container_name: marquez-web
    logging:
      driver: "none"
    ports:
      - "3000:3000"
    environment:
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
    depends_on:
      marquez:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  #  NESSIE  (catálogo Iceberg con historial Git-like)
  # ════════════════════════════════════════════════════════════════════════════

  nessie:
    image: ghcr.io/projectnessie/nessie:0.77.1
    container_name: nessie
    logging:
      driver: "none"
    ports:
      - "19120:19120"       # API REST + UI en /
    environment:
      NESSIE_VERSION_STORE_TYPE: IN_MEMORY   # producción: JDBC o ROCKSDB
    volumes:
      - nessie_data:/nessie/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:19120/api/v2/config || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ════════════════════════════════════════════════════════════════════════════
  #  GRAFANA  (observabilidad - dashboard de eventos OpenLineage)
  # ════════════════════════════════════════════════════════════════════════════

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    logging:
      driver: "none"
    ports:
      - "3001:3000"         # 3000 la ocupa Marquez-web
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-infinity-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./conf/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - marquez

  # ════════════════════════════════════════════════════════════════════════════
  #  REDIS  (broker + result backend de Celery)
  # ════════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: redis
    logging:
      driver: "none"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ════════════════════════════════════════════════════════════════════════════
  #  RAG API  (FastAPI - backend del chat)
  # ════════════════════════════════════════════════════════════════════════════

  rag-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-api
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./openlineage:/app/openlineage
      - ./chat:/app/chat
      - ./chroma_data:/app/rag/.chroma
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ════════════════════════════════════════════════════════════════════════════
  #  CELERY WORKER  (ejecuta tareas de sync en background)
  # ════════════════════════════════════════════════════════════════════════════

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: celery-worker
    logging:
      driver: "none"
    env_file: .env
    volumes:
      - ./openlineage:/app/openlineage
      - ./chat:/app/chat
      - ./chroma_data:/app/rag/.chroma
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "backend.tasks", "worker", "--loglevel=info", "--concurrency=1"]

  # ════════════════════════════════════════════════════════════════════════════
  #  RAG UI  (React - frontend del chat)
  # ════════════════════════════════════════════════════════════════════════════

  rag-ui:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: rag-ui
    logging:
      driver: "none"
    ports:
      - "8080:80"
    depends_on:
      rag-api:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  #  SPARK  (PySpark + Hudi + Delta + Iceberg + OpenLineage)
  # ════════════════════════════════════════════════════════════════════════════

  spark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark
    environment:
      OPENLINEAGE_URL: http://marquez:5000
      OPENLINEAGE_NAMESPACE: poc-openlineage
      # OPENLINEAGE_API_KEY: "changeme-secret-key"
      ICEBERG_CATALOG: nessie
      NESSIE_URI: http://nessie:19120/api/v1
      # ── Maven cache 
      IVY_CACHE: /root/.ivy2
    volumes:
      - ./examples:/app/examples:ro
      - ./generate_data.py:/app/generate_data.py:ro
      - ./inspect_lineage.py:/app/inspect_lineage.py:ro
      - ./data:/app/data
      - ./openlineage:/app/openlineage
      - ivy_cache:/root/.ivy2
    depends_on:
      marquez:
        condition: service_healthy
      nessie:
        condition: service_healthy
    command: ["tail", "-f", "/dev/null"]
