# ─────────────────────────────────────────────────────────────────────────────
#  Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  chroma_data:
  ivy_cache:
  hf_cache:

# ─────────────────────────────────────────────────────────────────────────────
#  Servicios
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ════════════════════════════════════════════════════════════════════════════
  #  REDIS  (broker + result backend de Celery)
  # ════════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ════════════════════════════════════════════════════════════════════════════
  #  RAG API  (FastAPI - backend del chat)
  # ════════════════════════════════════════════════════════════════════════════

  rag-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-api
    env_file: .env
    environment:
      HF_HOME: /app/hf_cache
    ports:
      - "8000:8000"
    volumes:
      - ./openlineage:/app/openlineage
      - ./chat:/app/chat
      - ./chroma_data:/app/rag/.chroma
      - hf_cache:/app/hf_cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ════════════════════════════════════════════════════════════════════════════
  #  CELERY WORKER  (ejecuta tareas de sync en background)
  # ════════════════════════════════════════════════════════════════════════════

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: celery-worker

    env_file: .env
    volumes:
      - ./openlineage:/app/openlineage
      - ./chat:/app/chat
      - ./chroma_data:/app/rag/.chroma
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "backend.tasks", "worker", "--loglevel=info", "--concurrency=1"]

  # ════════════════════════════════════════════════════════════════════════════
  #  RAG UI  (React - frontend del chat)
  # ════════════════════════════════════════════════════════════════════════════

  rag-ui:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID:-}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID:-}
    container_name: rag-ui

    ports:
      - "8080:80"
    depends_on:
      rag-api:
        condition: service_healthy

  # ════════════════════════════════════════════════════════════════════════════
  #  SPARK  (PySpark + OpenLineage — genera openlineage/events.ndjson)
  # ════════════════════════════════════════════════════════════════════════════

